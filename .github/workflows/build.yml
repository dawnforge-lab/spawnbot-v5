name: Build

on:
  push:
    branches: [ "main" ]
  pull_request: {}

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-dev

      - name: Build
        env:
          CGO_ENABLED: "1"
        run: go build -tags "goolm,stdjson,fts5" ./cmd/spawnbot/...

      - name: Test
        env:
          CGO_ENABLED: "1"
        run: go test -tags "goolm,stdjson,fts5" ./pkg/... ./tests/... -count=1
