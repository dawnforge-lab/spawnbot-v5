services:
  # ─────────────────────────────────────────────
  # Spawnbot Agent (one-shot query) - Full MCP Support
  #   docker compose -f docker/docker-compose.full.yml run --rm spawnbot-agent -m "Hello"
  # ─────────────────────────────────────────────
  spawnbot-agent:
    build:
      context: ..
      dockerfile: docker/Dockerfile.full
    container_name: spawnbot-agent-full
    profiles:
      - agent
    volumes:
      - ../config/config.json:/root/.spawnbot/config.json:ro
      - spawnbot-workspace:/root/.spawnbot/workspace
      - spawnbot-npm-cache:/root/.npm # npm cache for faster MCP server installs
    entrypoint: ["spawnbot", "agent"]
    stdin_open: true
    tty: true

  # ─────────────────────────────────────────────
  # Spawnbot Gateway (Long-running Bot) - Full MCP Support
  #   docker compose -f docker/docker-compose.full.yml --profile gateway up
  # ─────────────────────────────────────────────
  spawnbot-gateway:
    build:
      context: ..
      dockerfile: docker/Dockerfile.full
    container_name: spawnbot-gateway-full
    restart: unless-stopped
    profiles:
      - gateway
    volumes:
      # Configuration file
      - ../config/config.json:/root/.spawnbot/config.json:ro
      # Persistent workspace (sessions, memory, logs)
      - spawnbot-workspace:/root/.spawnbot/workspace
      # NPM cache for faster MCP server installs
      - spawnbot-npm-cache:/root/.npm
    command: ["gateway"]

volumes:
  spawnbot-workspace:
  spawnbot-npm-cache: # Cache npm packages to speed up MCP server installations
