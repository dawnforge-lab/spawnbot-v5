services:
  # ─────────────────────────────────────────────
  # Spawnbot Agent (one-shot query)
  #   docker compose -f docker/docker-compose.yml run --rm spawnbot-agent -m "Hello"
  # ─────────────────────────────────────────────
  spawnbot-agent:
    image: docker.io/dawnforge-lab/spawnbot:latest
    container_name: spawnbot-agent
    profiles:
      - agent
    # Uncomment to access host network; leave commented unless needed.
    #extra_hosts:
    #  - "host.docker.internal:host-gateway"
    volumes:
      - ./data:/root/.spawnbot
    entrypoint: ["spawnbot", "agent"]
    stdin_open: true
    tty: true

  # ─────────────────────────────────────────────
  # Spawnbot Gateway (Long-running Bot)
  #   docker compose -f docker/docker-compose.yml --profile gateway up
  # ─────────────────────────────────────────────
  spawnbot-gateway:
    image: docker.io/dawnforge-lab/spawnbot:latest
    container_name: spawnbot-gateway
    restart: on-failure
    profiles:
      - gateway
    # Uncomment to access host network; leave commented unless needed.
    #extra_hosts:
    #  - "host.docker.internal:host-gateway"
    volumes:
      - ./data:/root/.spawnbot

  # ─────────────────────────────────────────────
  # Spawnbot Launcher (Web Console + Gateway)
  #   docker compose -f docker/docker-compose.yml --profile launcher up
  # ─────────────────────────────────────────────
  spawnbot-launcher:
    image: docker.io/dawnforge-lab/spawnbot:launcher
    container_name: spawnbot-launcher
    restart: on-failure
    profiles:
      - launcher
    environment:
      - SPAWNBOT_GATEWAY_HOST=0.0.0.0
    ports:
      - "127.0.0.1:18800:18800"
      - "127.0.0.1:18790:18790"
    volumes:
      - ./data:/root/.spawnbot
